# Sentinel CI — M3 "CI-Ready Replay / Trust Layer" (see docs/M3_CONTRACT.md §GitHub Actions).
#
# Pipeline shape:
#   build   -> compiles all three components (Go agentctl, TS pw-executor, Python brain deps),
#              runs `go vet` + `go test ./...` + the Python offline suite (m3..m9_2b), and
#              publishes a reusable build artifact.
#   security-> secrets + supply-chain gates: gitleaks (HARD) + govulncheck (HARD, Go reachable
#              vulns) + pip-audit (advisory, Python) + npm audit (HARD on critical, pw-executor).
#   replay  -> matrix over the two fixtures; explores `testdata/site` to produce a plan,
#              freezes goldens from it, then replays against each matrix target with --ci
#              and ASSERTS the structured exit code (site -> 0, site-v2 -> 2 per the contract).
#   explore -> manual (workflow_dispatch) only; produces a downloadable plan.json artifact.
#
# The `security` job closes the docs-vs-reality gap (gitleaks was documented but absent from CI)
# and partially closes GAP-SEC-002 (supply-chain). The offline-suite + go test steps were run
# locally before this workflow was committed.
name: ci

on:
  push:
  pull_request:
  # Manual trigger drives the `explore` job (gated below on event_name).
  workflow_dispatch:

# Least-privilege default token: no job needs more than read — artifact up/download use the
# Actions runtime token, and gitleaks only reads. Override per-job if a step ever needs write.
permissions:
  contents: read

# One in-flight run per ref; newer pushes cancel stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # build: compile everything once, publish bin/ + pw-executor/dist/ as artifact.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.26 (control-plane / agentctl)
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node 24 (pw-executor)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv (Python env/dep manager for the brain)
        uses: astral-sh/setup-uv@v5

      - name: Build pw-executor (TypeScript -> dist/server.js)
        run: |
          cd pw-executor
          npm ci
          npm run build

      # Browsers land in the machine-global Playwright cache (~/.cache/ms-playwright),
      # so the server resolves them at runtime regardless of cwd.
      - name: Install Playwright browser (chromium-headless-shell)
        run: cd pw-executor && npx playwright install --with-deps chromium-headless-shell

      - name: Build agentctl (Go)
        run: go build -o bin/agentctl ./cmd/agentctl

      - name: Vet + unit test (Go)
        run: |
          go vet ./...
          go test ./...

      - name: Provision brain venv (full runtime deps — mirrors brain/pyproject.toml)
        run: |
          uv venv
          uv pip install langgraph langgraph-checkpoint-sqlite langgraph-checkpoint-postgres \
            anthropic openai pyyaml mcp grpcio grpcio-tools \
            opentelemetry-sdk opentelemetry-exporter-otlp-proto-grpc prometheus-client

      - name: Python offline suite (m3..m9_2b — FakeBackend/FakeExecutor, no network)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -e
          for t in m3 m4 m4b m5 b1 m7 m8 m9 m9_2 m9_2b; do
            echo "== test_${t}_offline =="
            .venv/bin/python tests/test_${t}_offline.py
          done

      # Ship only compiled outputs; node_modules / browsers / .venv are reinstalled
      # by downstream jobs (cheaper than dragging them through artifact storage).
      - name: Upload build artifact (bin/ + pw-executor/dist/)
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-build
          path: |
            bin/
            pw-executor/dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # replay: per-fixture deterministic replay with golden-diff, asserting exit code.
  # Plans live in git-ignored runs/, so we explore fresh here, freeze goldens, replay.
  # Per-job SQLite (M3_CONTRACT §GitHub Actions) — each matrix leg is isolated.
  # ---------------------------------------------------------------------------
  replay:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run both legs even if one fails, for full signal
      matrix:
        target: [site, site-v2]   # site -> expect exit 0, site-v2 -> expect exit 2
    steps:
      - uses: actions/checkout@v4   # provides testdata/, brain/, lockfiles

      - name: Set up Node 24 (runtime for pw-executor)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv (brain runtime deps)
        uses: astral-sh/setup-uv@v5

      # Restores bin/agentctl and pw-executor/dist/ at the repo root.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sentinel-build

      - name: Make agentctl executable
        run: chmod +x bin/agentctl

      # dist/ comes from the artifact; npm ci only restores the runtime node_modules
      # (the pw-executor imports `playwright` at runtime). No rebuild needed.
      - name: Restore pw-executor runtime deps
        run: cd pw-executor && npm ci

      - name: Install Playwright browser (chromium-headless-shell)
        run: cd pw-executor && npx playwright install --with-deps chromium-headless-shell

      - name: Provision brain venv
        run: |
          uv venv
          uv pip install langgraph langgraph-checkpoint-sqlite anthropic

      # Explore -> baseline -> replay. The heuristic planner is deterministic and
      # needs no ANTHROPIC_API_KEY; replay runs without --heal-llm for the same reason.
      - name: Explore + freeze goldens + replay (assert exit code)
        env:
          AUT_SHA: ${{ github.sha }}   # AUT-SHA-gated flake quarantine input
        run: |
          set -e   # any precondition (explore / baseline) failing aborts the job

          # 1) Explore the ORIGINAL site to produce a frozen plan at a known path.
          ./bin/agentctl run \
            --target "file://$PWD/testdata/site/index.html" \
            --artifact-dir "runs/ci" \
            --planner heuristic

          PLAN="runs/ci/plan.json"
          test -s "$PLAN"   # plan must exist and be non-empty

          # 2) Freeze dual goldens (a11y-hash + screenshot-hash) from the original site.
          #    This is the ONLY golden mutation path; the replay below never writes goldens.
          ./bin/agentctl baseline update \
            --plan "$PLAN" \
            --target "file://$PWD/testdata/site/index.html"

          # 3) Replay against this matrix leg's target with --ci (forbids --force-replay).
          #    Capture the exit code WITHOUT aborting under set -e.
          set +e
          ./bin/agentctl run --replay \
            --plan "$PLAN" \
            --target "file://$PWD/testdata/${{ matrix.target }}/index.html" \
            --aut-version "$AUT_SHA" \
            --ci
          code=$?
          set -e

          # 4) Assert the structured exit code per docs/M3_CONTRACT.md.
          case "${{ matrix.target }}" in
            site)    expected=0 ;;   # unchanged DOM: no heal, no golden regression
            site-v2) expected=2 ;;   # drifted DOM: heals + golden-diff regression
            *)       echo "::error::unknown matrix target ${{ matrix.target }}"; exit 1 ;;
          esac

          if [ "$code" -ne "$expected" ]; then
            echo "::error::replay against '${{ matrix.target }}' exited $code, expected $expected"
            exit 1
          fi
          echo "OK: replay against '${{ matrix.target }}' exited $code (expected $expected)"

      # Heal/golden-diff report is useful for debugging a failed assertion.
      - name: Upload replay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heal-report-${{ matrix.target }}
          path: runs/ci/heal-report.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # explore: MANUAL only (workflow_dispatch). Produces a fresh plan.json for download
  # (e.g. to seed a baseline update locally). Not part of push/PR gating.
  # ---------------------------------------------------------------------------
  explore:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24 (runtime for pw-executor)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv (brain runtime deps)
        uses: astral-sh/setup-uv@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sentinel-build

      - name: Make agentctl executable
        run: chmod +x bin/agentctl

      - name: Restore pw-executor runtime deps
        run: cd pw-executor && npm ci

      - name: Install Playwright browser (chromium-headless-shell)
        run: cd pw-executor && npx playwright install --with-deps chromium-headless-shell

      - name: Provision brain venv
        run: |
          uv venv
          uv pip install langgraph langgraph-checkpoint-sqlite anthropic

      - name: Explore testdata/site -> plan.json
        run: |
          set -e
          ./bin/agentctl run \
            --target "file://$PWD/testdata/site/index.html" \
            --artifact-dir "runs/explore" \
            --planner heuristic
          test -s runs/explore/plan.json

      - name: Upload plan.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan
          path: runs/explore/plan.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # security: secrets + supply-chain gates. gitleaks + govulncheck HARD-fail;
  # pip-audit advisory (Python deps unpinned — emits a freeze artifact); npm audit
  # fails only on CRITICAL. Runs in parallel with build (independent signal).
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scans the full history, not just the tip

      - name: gitleaks (secrets scan — HARD fail)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: govulncheck (Go reachable vulnerabilities — HARD fail)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Set up Node 24 (pw-executor SCA)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: npm audit (pw-executor — HARD fail on CRITICAL only)
        run: cd pw-executor && npm audit --audit-level=critical

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: pip-audit (Python deps — advisory; emits requirements.lock)
        continue-on-error: true   # deps are unpinned; transitive advisories are soft until a lockfile lands (GAP-SEC-002)
        run: |
          uv venv
          uv pip install langgraph langgraph-checkpoint-sqlite langgraph-checkpoint-postgres \
            anthropic openai pyyaml mcp grpcio grpcio-tools \
            opentelemetry-sdk opentelemetry-exporter-otlp-proto-grpc prometheus-client
          uv pip freeze > requirements.lock
          uvx pip-audit -r requirements.lock

      - name: Upload Python dependency freeze (advisory artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-requirements-lock
          path: requirements.lock
          if-no-files-found: warn
