// Sentinel RunControl (M8, ADR-021) — the Go orchestrator's gRPC contract.
// The brain reports per-node token deltas; the orchestrator reconciles them against the run's
// budget and may signal an abort (Control.abort). A model-INDEPENDENT hard kill (SIGTERM of the
// brain subprocess) is the backstop. Stubs are generated for Go + Python; this file's hash is
// asserted against the checked-in stubs (drift = build failure), mirroring persistence.proto.
syntax = "proto3";

package sentinel.runcontrol.v1;

option go_package = "github.com/AlexGromer/sentinel/internal/orchestrator/pb;pb";

service RunControl {
  // Register a run (limits set by the orchestrator from config/env).
  rpc StartRun (StartRunRequest) returns (StartRunReply);
  // brain -> orchestrator, once per node-step; the reply may instruct the brain to abort / degrade.
  rpc ReportEvent (RunEvent) returns (Control);
  // External abort (operator / deadline).
  rpc Abort (AbortRequest) returns (AbortReply);
}

message StartRunRequest {
  string run_id = 1;
  int64 plan_token_limit = 2;
  int64 heal_token_limit = 3;
  int64 total_token_limit = 4;
}
message StartRunReply { bool ok = 1; }

message RunEvent {
  string run_id = 1;
  string node = 2;               // LangGraph node name (plan / heal / ...)
  int64 prompt_tokens = 3;       // cumulative for the run
  int64 completion_tokens = 4;
  string status = 5;             // running | done | error
}
message Control {
  bool abort = 1;
  string reason = 2;
}

message AbortRequest {
  string run_id = 1;
  string reason = 2;
}
message AbortReply { bool ok = 1; }
